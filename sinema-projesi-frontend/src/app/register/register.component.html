<section class="register-page">
  <div class="register-card">
    <a routerLink="/" class="back">← Ana sayfa</a>
    <h1 class="title">Kayıt Ol</h1>
    <p class="hint">Hesap oluşturarak bilet almaya başlayın.</p>

    <form class="form" [formGroup]="form" (ngSubmit)="submit()">
      <label class="field">
        <span>Kullanıcı adı</span>
        <input type="text" formControlName="userName" autocomplete="username" />
      </label>
      <div class="row2">
        <label class="field">
          <span>Ad</span>
          <input type="text" formControlName="firstName" autocomplete="given-name" />
        </label>
        <label class="field">
          <span>Soyad</span>
          <input type="text" formControlName="lastName" autocomplete="family-name" />
        </label>
      </div>
      <label class="field">
        <span>E-posta</span>
        <input type="email" formControlName="email" autocomplete="email" />
      </label>
      <label class="field">
        <span>Şifre</span>
        <input type="password" formControlName="password" autocomplete="new-password" />
      </label>
      <label class="field">
        <span>Şifre tekrar</span>
        <input type="password" formControlName="confirmPassword" autocomplete="new-password" />
      </label>

      <div class="err" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" class="submit" [disabled]="submitting">
        {{ submitting ? 'Kaydediliyor…' : 'Hesap Oluştur' }}
      </button>
    </form>

    <p class="footer">
      Zaten hesabın var mı?
      <a routerLink="/login">Giriş yap</a>
    </p>
  </div>
</section>
